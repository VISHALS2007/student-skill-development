<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Skill Development icon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="116" height="116" rx="24" fill="url(#bg)" />
  <rect x="6" y="6" width="116" height="116" rx="24" fill="none" stroke="white" stroke-opacity="0.35" stroke-width="2" />

  <g stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Upward arrow for growth -->
    <path d="M40 78 L64 54 L88 78" />
    <path d="M64 54 L64 94" />
  </g>

  <!-- Skill bars -->
  <g fill="white" opacity="0.9">
    <rect x="32" y="74" width="10" height="20" rx="3" />
    <rect x="48" y="66" width="10" height="28" rx="3" />
    <rect x="66" y="58" width="10" height="36" rx="3" />
    <rect x="84" y="50" width="10" height="44" rx="3" />
  </g>

  <!-- Badge -->
  <circle cx="94" cy="34" r="12" fill="url(#accent)" />
  <text x="94" y="38" font-size="14" font-weight="700" text-anchor="middle" fill="white">SD</text>
</svg>
