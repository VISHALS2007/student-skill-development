<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-label="Student learning illustration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#6b63f7" />
      <stop offset="100%" stop-color="#8a7bff" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9ff" stop-opacity="0.97" />
      <stop offset="100%" stop-color="#eef1ff" stop-opacity="0.92" />
    </linearGradient>
    <linearGradient id="desk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d7e1ff" />
      <stop offset="100%" stop-color="#c4cef5" />
    </linearGradient>
    <linearGradient id="chair" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b7280" />
      <stop offset="100%" stop-color="#4b5563" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#32345d" flood-opacity="0.28" />
    </filter>
  </defs>

  <rect x="18" y="18" width="684" height="864" rx="28" fill="url(#bg)" stroke="#cfd5ff" stroke-opacity="0.22" stroke-width="2" />
  <rect x="48" y="52" width="624" height="800" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#d5dbff" stroke-opacity="0.18" />

  <g filter="url(#shadow)">
    <rect x="110" y="250" width="500" height="380" rx="26" fill="url(#panel)" />
    <rect x="110" y="250" width="500" height="380" rx="26" fill="none" stroke="#dfe3ff" stroke-opacity="0.65" />
  </g>

  <!-- Desk -->
  <rect x="170" y="520" width="380" height="26" rx="10" fill="url(#desk)" />
  <rect x="190" y="546" width="340" height="12" rx="6" fill="#b7c2ec" />

  <!-- Laptop -->
  <rect x="300" y="440" width="140" height="18" rx="6" fill="#1f2937" />
  <rect x="280" y="380" width="180" height="70" rx="10" fill="#0f172a" />
  <rect x="288" y="390" width="164" height="50" rx="8" fill="#0b1226" />
  <rect x="300" y="398" width="140" height="34" rx="6" fill="#111827" />
  <rect x="306" y="404" width="128" height="8" rx="4" fill="#22d3ee" />
  <rect x="306" y="416" width="92" height="8" rx="4" fill="#a78bfa" />

  <!-- Student (abstract) -->
  <circle cx="250" cy="360" r="38" fill="#fbbf24" />
  <circle cx="250" cy="350" r="26" fill="#fef3c7" />
  <rect x="220" y="400" width="80" height="120" rx="24" fill="#2563eb" />
  <rect x="210" y="440" width="20" height="90" rx="10" fill="#1d4ed8" />
  <rect x="300" y="440" width="20" height="90" rx="10" fill="#1d4ed8" />
  <rect x="238" y="508" width="24" height="46" rx="10" fill="#111827" />
  <rect x="282" y="508" width="24" height="46" rx="10" fill="#111827" />
  <rect x="220" y="520" width="70" height="16" rx="8" fill="#0ea5e9" />

  <!-- Chair -->
  <rect x="420" y="458" width="34" height="110" rx="12" fill="url(#chair)" />
  <rect x="414" y="560" width="46" height="16" rx="8" fill="#374151" />

  <!-- Books -->
  <rect x="360" y="500" width="58" height="12" rx="4" fill="#f97316" />
  <rect x="354" y="514" width="64" height="12" rx="4" fill="#3b82f6" />
  <rect x="348" y="528" width="70" height="12" rx="4" fill="#10b981" />

  <!-- Floating progress bars -->
  <g fill="#22d3ee" fill-opacity="0.9">
    <rect x="150" y="300" width="90" height="12" rx="6" />
    <rect x="480" y="320" width="90" height="12" rx="6" />
    <rect x="190" y="340" width="70" height="10" rx="5" fill-opacity="0.7" />
    <rect x="480" y="350" width="70" height="10" rx="5" fill-opacity="0.7" />
  </g>

  <!-- Glow accents -->
  <circle cx="180" cy="240" r="16" fill="#a78bfa" fill-opacity="0.55" />
  <circle cx="520" cy="230" r="12" fill="#22d3ee" fill-opacity="0.55" />
  <circle cx="580" cy="280" r="18" fill="#f97316" fill-opacity="0.45" />
</svg>
